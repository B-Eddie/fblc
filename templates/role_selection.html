<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Choose Role</title>
</head>
<body class="bg-gradient-to-r from-purple-600 to-blue-500 h-screen flex items-center justify-center text-white">
    <div class="text-center bg-white bg-opacity-10 p-6 rounded-lg shadow-lg">
        <h1 class="text-4xl font-bold mb-6">Are you a Driver or a Passenger?</h1>
        <form action="/select_role" method="post" class="space-y-4">
            <button type="submit" name="role" value="Driver" class="bg-purple-700 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded transition w-full">
                Driver
            </button>
            <button type="submit" name="role" value="Passenger" class="bg-blue-700 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition w-full">
                Passenger
            </button>
        </form>
    </div>
</body>
</html>
